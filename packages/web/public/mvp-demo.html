<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Office MVP — Isometric Office</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0f0f1a; color: #e5e7eb; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

/* Top bar */
.topbar { background: #161625; border-bottom: 1px solid rgba(100,116,139,0.2); padding: 8px 16px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
.topbar h1 { font-size: 14px; font-weight: 600; }
.topbar .badge { font-size: 10px; background: rgba(99,102,241,0.2); color: #818cf8; padding: 2px 8px; border-radius: 9999px; }

/* Layout */
.main { flex: 1; display: flex; min-height: 0; }
.office-panel { flex: 1; position: relative; }
.side-panel { width: 360px; border-left: 1px solid rgba(100,116,139,0.2); display: flex; flex-direction: column; overflow: hidden; }

/* Canvas */
canvas { display: block; width: 100%; height: 100%; }

/* Side panel tabs */
.tabs { display: flex; border-bottom: 1px solid rgba(100,116,139,0.2); flex-shrink: 0; }
.tab { flex: 1; padding: 8px; text-align: center; font-size: 11px; cursor: pointer; color: #9ca3af; border-bottom: 2px solid transparent; transition: all 0.2s; }
.tab.active { color: #818cf8; border-bottom-color: #818cf8; }
.tab:hover { color: #c7d2fe; }

/* Scrollable content */
.panel-content { flex: 1; overflow-y: auto; padding: 12px; }

/* KPI cards */
.kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
.kpi-card { background: #1e1e30; border: 1px solid rgba(100,116,139,0.15); border-radius: 10px; padding: 10px 12px; }
.kpi-label { font-size: 10px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.5px; }
.kpi-value { font-size: 20px; font-weight: 700; margin-top: 2px; }
.kpi-trend { font-size: 10px; margin-top: 2px; }
.kpi-trend.up { color: #34d399; }
.kpi-trend.down { color: #f87171; }

/* Agent list */
.agent-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px; margin-bottom: 4px; cursor: pointer; transition: background 0.15s; }
.agent-item:hover { background: rgba(100,116,139,0.1); }
.agent-item.selected { background: rgba(99,102,241,0.15); border: 1px solid rgba(99,102,241,0.3); }
.agent-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; border: 2px solid; flex-shrink: 0; }
.agent-info { flex: 1; min-width: 0; }
.agent-name { font-size: 12px; font-weight: 600; }
.agent-role { font-size: 10px; color: #6b7280; }
.agent-status { font-size: 10px; display: flex; align-items: center; gap: 4px; }
.status-dot { width: 6px; height: 6px; border-radius: 50%; }

/* Task list */
.task-item { padding: 8px 10px; border-radius: 8px; margin-bottom: 6px; border: 1px solid rgba(100,116,139,0.15); background: #1e1e30; }
.task-title { font-size: 12px; font-weight: 500; }
.task-meta { font-size: 10px; color: #6b7280; margin-top: 3px; display: flex; gap: 8px; }
.task-status { font-size: 9px; padding: 1px 6px; border-radius: 4px; font-weight: 600; }
.task-status.pending { background: rgba(251,191,36,0.15); color: #fbbf24; }
.task-status.running { background: rgba(59,130,246,0.15); color: #60a5fa; }
.task-status.done { background: rgba(52,211,153,0.15); color: #34d399; }
.task-status.failed { background: rgba(248,113,113,0.15); color: #f87171; }

/* Activity log */
.log-entry { font-size: 10px; padding: 4px 0; border-bottom: 1px solid rgba(100,116,139,0.08); color: #9ca3af; }
.log-time { color: #4b5563; margin-right: 6px; }
.log-agent { color: #818cf8; font-weight: 500; }

/* Office overlay info */
.office-info { position: absolute; top: 8px; left: 12px; font-size: 11px; color: rgba(148,163,184,0.6); pointer-events: none; }

/* Tooltip */
.tooltip { position: absolute; background: #1e1e30; border: 1px solid rgba(100,116,139,0.3); border-radius: 8px; padding: 8px 12px; font-size: 11px; pointer-events: none; z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,0.5); display: none; }
.tooltip .tt-name { font-weight: 600; font-size: 12px; }
.tooltip .tt-role { color: #6b7280; font-size: 10px; }
.tooltip .tt-status { margin-top: 4px; font-size: 10px; }

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(100,116,139,0.3); border-radius: 2px; }
</style>
</head>
<body>

<div class="topbar">
  <span style="font-size:18px">🏢</span>
  <h1>AI Office</h1>
  <span class="badge">MVP v1.0</span>
  <span style="flex:1"></span>
  <span style="font-size:10px;color:#6b7280" id="clock"></span>
</div>

<div class="main">
  <div class="office-panel">
    <canvas id="office"></canvas>
    <div class="office-info">🏢 Office Floor — 클릭하여 에이전트 선택 | 마우스휠: 줌 | 드래그: 이동</div>
    <div class="tooltip" id="tooltip">
      <div class="tt-name"></div>
      <div class="tt-role"></div>
      <div class="tt-status"></div>
    </div>
  </div>

  <div class="side-panel">
    <div class="tabs">
      <div class="tab active" data-tab="dashboard">📊 대시보드</div>
      <div class="tab" data-tab="agents">👥 에이전트</div>
      <div class="tab" data-tab="tasks">📋 태스크</div>
      <div class="tab" data-tab="log">📝 로그</div>
    </div>
    <div class="panel-content" id="panel-content"></div>
  </div>
</div>

<script>
// ============================================================
// AI OFFICE MVP — COMPLETE ISOMETRIC OFFICE SIMULATION
// ============================================================

// === CONSTANTS ===
const TILE_W = 64, TILE_H = 32;
const GRID_COLS = 16, GRID_ROWS = 12;
const ROLE_EMOJI = { pm: '📋', developer: '⚙️', reviewer: '🔍', designer: '🎨', qa: '🧪', devops: '🚀' };
const ROLE_COLORS = { pm: '#818cf8', developer: '#60a5fa', reviewer: '#a78bfa', designer: '#f472b6', qa: '#34d399', devops: '#fb923c' };
const STATUS_COLORS = { idle: '#34d399', thinking: '#60a5fa', executing: '#fbbf24', reviewing: '#a78bfa', blocked: '#f87171', offline: '#4b5563' };
const STATUS_LABELS = { idle: '대기', thinking: '사고 중', executing: '실행 중', reviewing: '리뷰 중', blocked: '차단됨', offline: '오프라인' };

// === ISOMETRIC COORDINATE SYSTEM ===
function cartToIso(x, y) {
  return { sx: (x - y) * (TILE_W / 2), sy: (x + y) * (TILE_H / 2) };
}
function isoToCart(sx, sy) {
  return { x: (sx / (TILE_W/2) + sy / (TILE_H/2)) / 2, y: (sy / (TILE_H/2) - sx / (TILE_W/2)) / 2 };
}

// === ROOM ZONES ===
const ROOMS = [
  { name: '개발실', x: 0, y: 0, w: 8, h: 6, color: 'rgba(96,165,250,0.04)' },
  { name: '회의실', x: 9, y: 0, w: 5, h: 4, color: 'rgba(167,139,250,0.04)' },
  { name: 'PM실', x: 9, y: 5, w: 5, h: 4, color: 'rgba(129,140,248,0.04)' },
  { name: '휴게실', x: 0, y: 7, w: 5, h: 5, color: 'rgba(52,211,153,0.04)' },
  { name: '서버실', x: 9, y: 10, w: 5, h: 2, color: 'rgba(251,146,60,0.04)' },
];

// === DESK POSITIONS (grid coords) ===
const DESK_SLOTS = [
  [2,1],[4,1],[6,1],  // row 1
  [2,3],[4,3],[6,3],  // row 2
  [2,5],[4,5],        // row 3
  [10,1],[12,1],      // meeting area
  [10,6],[12,6],      // PM area
];

// === FURNITURE ===
const FURNITURE = [
  { type: 'plant', gx: 0, gy: 0 }, { type: 'plant', gx: 7, gy: 0 },
  { type: 'plant', gx: 0, gy: 6 }, { type: 'plant', gx: 14, gy: 0 },
  { type: 'coffee', gx: 1, gy: 8 }, { type: 'water', gx: 3, gy: 8 },
  { type: 'server', gx: 10, gy: 10 }, { type: 'server', gx: 12, gy: 10 },
  { type: 'whiteboard', gx: 10, gy: 2 },
];

// === SIMULATED AGENTS ===
const AGENTS = [
  { id: 'a1', name: '지훈', role: 'pm', status: 'idle', deskIdx: 0, taskId: null },
  { id: 'a2', name: '서연', role: 'developer', status: 'idle', deskIdx: 1, taskId: null },
  { id: 'a3', name: '민수', role: 'developer', status: 'idle', deskIdx: 2, taskId: null },
  { id: 'a4', name: '하윤', role: 'designer', status: 'idle', deskIdx: 3, taskId: null },
  { id: 'a5', name: '도현', role: 'reviewer', status: 'idle', deskIdx: 4, taskId: null },
  { id: 'a6', name: '수아', role: 'qa', status: 'idle', deskIdx: 5, taskId: null },
];

let tasks = [];
let events = [];
let selectedAgentId = null;
let currentTab = 'dashboard';
let taskIdCounter = 0;

// === STATS ===
let stats = { completed: 0, failed: 0, totalTime: 0, count: 0 };

// === CANVAS STATE ===
const canvas = document.getElementById('office');
const ctx = canvas.getContext('2d');
let camX = 0, camY = 0, zoom = 1.0;
let dragging = false, dragStartX = 0, dragStartY = 0, camStartX = 0, camStartY = 0;
let hoveredAgent = null;
let animTime = 0;

// Resize
function resize() {
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * devicePixelRatio;
  canvas.height = rect.height * devicePixelRatio;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// Center view initially
camX = canvas.width / devicePixelRatio / 2 - 100;
camY = 60;

// === DRAWING FUNCTIONS ===

function drawIsoTile(gx, gy, fillColor, strokeColor, lineWidth = 0.5) {
  const { sx, sy } = cartToIso(gx, gy);
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(sx, sy - TILE_H/2);
  ctx.lineTo(sx + TILE_W/2, sy);
  ctx.lineTo(sx, sy + TILE_H/2);
  ctx.lineTo(sx - TILE_W/2, sy);
  ctx.closePath();
  if (fillColor) { ctx.fillStyle = fillColor; ctx.fill(); }
  if (strokeColor) { ctx.strokeStyle = strokeColor; ctx.lineWidth = lineWidth; ctx.stroke(); }
  ctx.restore();
}

function drawFloor() {
  // Room fills
  for (const room of ROOMS) {
    for (let gy = room.y; gy < room.y + room.h; gy++) {
      for (let gx = room.x; gx < room.x + room.w; gx++) {
        drawIsoTile(gx, gy, room.color, null);
      }
    }
  }
  // Grid lines
  for (let gy = 0; gy < GRID_ROWS; gy++) {
    for (let gx = 0; gx < GRID_COLS; gx++) {
      drawIsoTile(gx, gy, null, 'rgba(100,116,139,0.08)');
    }
  }
  // Room labels
  ctx.font = '9px sans-serif';
  ctx.fillStyle = 'rgba(148,163,184,0.3)';
  ctx.textAlign = 'center';
  for (const room of ROOMS) {
    const cx = room.x + room.w / 2;
    const cy = room.y + room.h / 2;
    const { sx, sy } = cartToIso(cx, cy);
    ctx.fillText(room.name, sx, sy + 3);
  }
}

function drawDesk(gx, gy, occupied) {
  const { sx, sy } = cartToIso(gx, gy);
  // Desk top (isometric rectangle)
  const dw = 22, dh = 14;
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(sx, sy - dh);
  ctx.lineTo(sx + dw, sy - dh/2);
  ctx.lineTo(sx, sy);
  ctx.lineTo(sx - dw, sy - dh/2);
  ctx.closePath();
  ctx.fillStyle = occupied ? '#2a2a40' : '#1e1e30';
  ctx.fill();
  ctx.strokeStyle = 'rgba(100,116,139,0.2)';
  ctx.lineWidth = 0.5;
  ctx.stroke();
  // Monitor
  ctx.fillStyle = occupied ? '#3b82f6' : '#374151';
  ctx.fillRect(sx - 4, sy - dh - 8, 8, 6);
  ctx.fillStyle = occupied ? '#1e3a5f' : '#1f2937';
  ctx.fillRect(sx - 3, sy - dh - 7, 6, 4);
  ctx.restore();
}

function drawFurniture() {
  for (const f of FURNITURE) {
    const { sx, sy } = cartToIso(f.gx, f.gy);
    ctx.save();
    if (f.type === 'plant') {
      ctx.fillStyle = '#065f46';
      ctx.beginPath(); ctx.arc(sx, sy - 8, 6, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#7c3aed';
      ctx.beginPath(); ctx.arc(sx + 2, sy - 12, 2.5, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#92400e';
      ctx.fillRect(sx - 2, sy - 4, 4, 4);
    } else if (f.type === 'coffee') {
      ctx.fillStyle = '#44403c';
      ctx.fillRect(sx - 5, sy - 12, 10, 12);
      ctx.fillStyle = '#78716c';
      ctx.fillRect(sx - 4, sy - 10, 8, 4);
      ctx.fillStyle = '#ef4444';
      ctx.beginPath(); ctx.arc(sx, sy - 4, 1.5, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = 'rgba(148,163,184,0.25)';
      ctx.font = '7px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('☕', sx, sy + 8);
    } else if (f.type === 'water') {
      ctx.fillStyle = '#1e3a5f';
      ctx.fillRect(sx - 4, sy - 14, 8, 14);
      ctx.fillStyle = '#3b82f6';
      ctx.fillRect(sx - 3, sy - 10, 6, 6);
    } else if (f.type === 'server') {
      ctx.fillStyle = '#1f2937';
      ctx.fillRect(sx - 6, sy - 16, 12, 16);
      ctx.fillStyle = '#374151';
      ctx.fillRect(sx - 5, sy - 14, 10, 3);
      ctx.fillRect(sx - 5, sy - 10, 10, 3);
      ctx.fillRect(sx - 5, sy - 6, 10, 3);
      // Blinking lights
      const blink = Math.sin(animTime * 3 + f.gx) > 0;
      ctx.fillStyle = blink ? '#34d399' : '#065f46';
      ctx.beginPath(); ctx.arc(sx + 3, sy - 13, 1, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#3b82f6';
      ctx.beginPath(); ctx.arc(sx + 3, sy - 9, 1, 0, Math.PI*2); ctx.fill();
    } else if (f.type === 'whiteboard') {
      ctx.fillStyle = '#f8fafc';
      ctx.fillRect(sx - 12, sy - 16, 24, 14);
      ctx.strokeStyle = '#374151';
      ctx.lineWidth = 0.5;
      ctx.strokeRect(sx - 12, sy - 16, 24, 14);
      ctx.fillStyle = '#3b82f6';
      ctx.fillRect(sx - 8, sy - 12, 10, 1);
      ctx.fillStyle = '#ef4444';
      ctx.fillRect(sx - 8, sy - 9, 7, 1);
      ctx.fillStyle = '#34d399';
      ctx.fillRect(sx - 8, sy - 6, 12, 1);
    }
    ctx.restore();
  }
}

function drawAgent(agent, t) {
  const desk = DESK_SLOTS[agent.deskIdx % DESK_SLOTS.length];
  const targetGx = desk[0], targetGy = desk[1];
  
  // Smooth position (agents store actual positions for animation)
  if (!agent._px) { const p = cartToIso(targetGx, targetGy); agent._px = p.sx; agent._py = p.sy; }
  const target = cartToIso(targetGx, targetGy);
  agent._px += (target.sx - agent._px) * 0.08;
  agent._py += (target.sy - agent._py) * 0.08;
  
  const sx = agent._px, sy = agent._py;
  const color = ROLE_COLORS[agent.role] || '#6b7280';
  const statusColor = STATUS_COLORS[agent.status] || '#6b7280';
  const isSelected = agent.id === selectedAgentId;
  const isHovered = agent.id === hoveredAgent;

  ctx.save();

  // Breathing animation
  const breathe = Math.sin(t * 2 + agent.deskIdx) * 1;
  const baseY = sy - 20 + breathe;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.beginPath();
  ctx.ellipse(sx, sy - 2, 10, 4, 0, 0, Math.PI * 2);
  ctx.fill();

  // Selection ring
  if (isSelected || isHovered) {
    ctx.strokeStyle = isSelected ? '#818cf8' : 'rgba(129,140,248,0.4)';
    ctx.lineWidth = isSelected ? 2 : 1;
    ctx.beginPath();
    ctx.ellipse(sx, baseY + 2, 14, 14, 0, 0, Math.PI * 2);
    ctx.stroke();
  }

  // Status ring (pulsing)
  const pulse = agent.status === 'thinking' || agent.status === 'executing'
    ? 1 + Math.sin(t * 4) * 0.15 : 1;
  ctx.strokeStyle = statusColor;
  ctx.lineWidth = 2;
  ctx.globalAlpha = agent.status === 'offline' ? 0.3 : 0.8;
  ctx.beginPath();
  ctx.arc(sx, baseY, 13 * pulse, 0, Math.PI * 2);
  ctx.stroke();
  ctx.globalAlpha = 1;

  // Avatar circle
  ctx.globalAlpha = agent.status === 'offline' ? 0.3 : 1;
  const grad = ctx.createRadialGradient(sx - 3, baseY - 3, 2, sx, baseY, 12);
  grad.addColorStop(0, color);
  grad.addColorStop(1, adjustBrightness(color, -40));
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(sx, baseY, 11, 0, Math.PI * 2);
  ctx.fill();

  // Emoji
  ctx.font = '12px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(ROLE_EMOJI[agent.role] || '👤', sx, baseY + 1);
  ctx.globalAlpha = 1;

  // Status dot
  ctx.fillStyle = statusColor;
  const dotBlink = agent.status === 'blocked' ? Math.sin(t * 6) > 0 ? 1 : 0.2 : 1;
  ctx.globalAlpha = dotBlink;
  ctx.beginPath();
  ctx.arc(sx + 10, baseY - 8, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;

  // Name
  ctx.font = '9px sans-serif';
  ctx.fillStyle = '#d1d5db';
  ctx.textBaseline = 'top';
  ctx.fillText(agent.name, sx, baseY + 14);

  // Status bubble for active agents
  if (agent.status === 'thinking' || agent.status === 'executing' || agent.status === 'reviewing') {
    drawBubble(sx, baseY - 26, agent);
  }

  // Blocked indicator
  if (agent.status === 'blocked') {
    const bounce = Math.abs(Math.sin(t * 5)) * 4;
    ctx.font = '14px sans-serif';
    ctx.textBaseline = 'middle';
    ctx.fillText('❗', sx + 14, baseY - 6 - bounce);
  }

  // Executing: gear rotation
  if (agent.status === 'executing') {
    ctx.save();
    ctx.translate(sx - 14, baseY - 6);
    ctx.rotate(t * 3);
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('⚙️', 0, 0);
    ctx.restore();
  }

  // Reviewing: magnifying glass wobble
  if (agent.status === 'reviewing') {
    const wobble = Math.sin(t * 4) * 0.3;
    ctx.save();
    ctx.translate(sx - 14, baseY - 6);
    ctx.rotate(wobble);
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🔍', 0, 0);
    ctx.restore();
  }

  ctx.restore();

  // Store hit area for click/hover detection
  agent._hitX = sx; agent._hitY = baseY; agent._hitR = 14;
}

function drawBubble(x, y, agent) {
  const text = agent.status === 'thinking' ? '생각 중...'
    : agent.status === 'executing' ? '실행 중...'
    : '리뷰 중...';
  
  ctx.save();
  ctx.font = '9px sans-serif';
  const w = ctx.measureText(text).width + 12;
  const h = 16;
  const bx = x - w/2, by = y - h;
  
  // Bubble bg
  ctx.fillStyle = 'rgba(30,30,48,0.9)';
  ctx.strokeStyle = 'rgba(100,116,139,0.3)';
  ctx.lineWidth = 0.5;
  roundRect(ctx, bx, by, w, h, 4);
  ctx.fill(); ctx.stroke();
  
  // Tail
  ctx.fillStyle = 'rgba(30,30,48,0.9)';
  ctx.beginPath();
  ctx.moveTo(x - 3, by + h);
  ctx.lineTo(x, by + h + 4);
  ctx.lineTo(x + 3, by + h);
  ctx.fill();
  
  // Typing dots animation for thinking
  if (agent.status === 'thinking') {
    for (let i = 0; i < 3; i++) {
      const dotAlpha = (Math.sin(animTime * 4 + i * 1.2) + 1) / 2;
      ctx.fillStyle = `rgba(96,165,250,${0.3 + dotAlpha * 0.7})`;
      ctx.beginPath();
      ctx.arc(x - 6 + i * 6, by + h/2, 2, 0, Math.PI * 2);
      ctx.fill();
    }
  } else {
    ctx.fillStyle = '#d1d5db';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, x, by + h/2);
  }
  ctx.restore();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function adjustBrightness(hex, amt) {
  let r = parseInt(hex.slice(1,3),16) + amt;
  let g = parseInt(hex.slice(3,5),16) + amt;
  let b = parseInt(hex.slice(5,7),16) + amt;
  r = Math.max(0, Math.min(255, r));
  g = Math.max(0, Math.min(255, g));
  b = Math.max(0, Math.min(255, b));
  return `rgb(${r},${g},${b})`;
}

// === PARTICLES ===
let particles = [];
function spawnParticles(x, y, color, count = 8) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y, vx: (Math.random() - 0.5) * 3, vy: -Math.random() * 2 - 1,
      life: 1, color, size: Math.random() * 3 + 1
    });
  }
}
function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.life -= dt * 2;
    if (p.life <= 0) particles.splice(i, 1);
  }
}
function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// === RENDER LOOP ===
let lastTime = 0;
function render(time) {
  const dt = Math.min((time - lastTime) / 1000, 0.1);
  lastTime = time;
  animTime = time / 1000;
  
  const w = canvas.width / devicePixelRatio;
  const h = canvas.height / devicePixelRatio;
  
  ctx.clearRect(0, 0, w, h);
  ctx.save();
  ctx.translate(camX, camY);
  ctx.scale(zoom, zoom);
  
  drawFloor();
  
  // Draw desks
  const occupiedDesks = new Set(AGENTS.map(a => a.deskIdx));
  DESK_SLOTS.forEach(([gx, gy], i) => drawDesk(gx, gy, occupiedDesks.has(i)));
  
  drawFurniture();
  
  // Draw agents (sorted by Y for depth)
  const sortedAgents = [...AGENTS].sort((a, b) => {
    const da = DESK_SLOTS[a.deskIdx % DESK_SLOTS.length];
    const db = DESK_SLOTS[b.deskIdx % DESK_SLOTS.length];
    return (da[0] + da[1]) - (db[0] + db[1]);
  });
  for (const agent of sortedAgents) {
    drawAgent(agent, animTime);
  }
  
  updateParticles(dt);
  drawParticles();
  
  ctx.restore();
  requestAnimationFrame(render);
}
requestAnimationFrame(render);

// === INPUT HANDLING ===
canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  const zoomDelta = e.deltaY > 0 ? 0.9 : 1.1;
  zoom = Math.max(0.5, Math.min(2.5, zoom * zoomDelta));
});

canvas.addEventListener('mousedown', (e) => {
  dragging = true;
  dragStartX = e.clientX; dragStartY = e.clientY;
  camStartX = camX; camStartY = camY;
});

canvas.addEventListener('mousemove', (e) => {
  if (dragging) {
    camX = camStartX + (e.clientX - dragStartX);
    camY = camStartY + (e.clientY - dragStartY);
    return;
  }
  // Hover detection
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left - camX) / zoom;
  const my = (e.clientY - rect.top - camY) / zoom;
  
  hoveredAgent = null;
  for (const agent of AGENTS) {
    if (!agent._hitX) continue;
    const dx = mx - agent._hitX, dy = my - agent._hitY;
    if (dx*dx + dy*dy < agent._hitR * agent._hitR) {
      hoveredAgent = agent.id;
      break;
    }
  }
  canvas.style.cursor = hoveredAgent ? 'pointer' : 'grab';
  
  // Tooltip
  const tooltip = document.getElementById('tooltip');
  if (hoveredAgent) {
    const agent = AGENTS.find(a => a.id === hoveredAgent);
    tooltip.querySelector('.tt-name').textContent = `${ROLE_EMOJI[agent.role]} ${agent.name}`;
    tooltip.querySelector('.tt-role').textContent = agent.role.toUpperCase();
    tooltip.querySelector('.tt-status').textContent = STATUS_LABELS[agent.status];
    tooltip.querySelector('.tt-status').style.color = STATUS_COLORS[agent.status];
    tooltip.style.display = 'block';
    tooltip.style.left = (e.clientX + 12) + 'px';
    tooltip.style.top = (e.clientY - 10) + 'px';
  } else {
    tooltip.style.display = 'none';
  }
});

canvas.addEventListener('mouseup', (e) => {
  const wasDrag = Math.abs(e.clientX - dragStartX) > 3 || Math.abs(e.clientY - dragStartY) > 3;
  dragging = false;
  if (wasDrag) return;
  
  // Click detection
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left - camX) / zoom;
  const my = (e.clientY - rect.top - camY) / zoom;
  
  for (const agent of AGENTS) {
    if (!agent._hitX) continue;
    const dx = mx - agent._hitX, dy = my - agent._hitY;
    if (dx*dx + dy*dy < agent._hitR * agent._hitR) {
      selectedAgentId = selectedAgentId === agent.id ? null : agent.id;
      renderPanel();
      return;
    }
  }
  selectedAgentId = null;
  renderPanel();
});

canvas.addEventListener('mouseleave', () => {
  document.getElementById('tooltip').style.display = 'none';
  hoveredAgent = null;
});

// === SIMULATION ENGINE ===
const TASK_TEMPLATES = [
  { title: '사용자 인증 API 구현', desc: 'JWT 기반 로그인/회원가입 API', role: 'developer' },
  { title: '대시보드 UI 디자인', desc: '메인 대시보드 레이아웃 설계', role: 'designer' },
  { title: '코드 리뷰: PR #42', desc: 'API 엔드포인트 코드 리뷰', role: 'reviewer' },
  { title: 'E2E 테스트 작성', desc: '주요 사용자 플로우 테스트', role: 'qa' },
  { title: '스프린트 기획', desc: '다음 스프린트 백로그 정리', role: 'pm' },
  { title: 'CI/CD 파이프라인 설정', desc: 'GitHub Actions 워크플로우', role: 'devops' },
  { title: '검색 기능 구현', desc: '전문 검색 엔진 연동', role: 'developer' },
  { title: '성능 최적화 보고서', desc: '프론트엔드 번들 사이즈 분석', role: 'pm' },
  { title: '반응형 레이아웃 구현', desc: '모바일/태블릿 대응', role: 'developer' },
  { title: '보안 취약점 스캔', desc: 'OWASP Top 10 체크리스트', role: 'qa' },
  { title: '컴포넌트 라이브러리 정리', desc: 'Storybook 문서화', role: 'designer' },
  { title: '데이터베이스 마이그레이션', desc: 'PostgreSQL 스키마 업데이트', role: 'devops' },
];

function addLog(msg, agentId = null) {
  const now = new Date();
  const time = now.toTimeString().slice(0,5);
  const agent = agentId ? AGENTS.find(a => a.id === agentId) : null;
  events.unshift({ time, msg, agentName: agent?.name, agentRole: agent?.role });
  if (events.length > 50) events.pop();
}

function createSimTask() {
  const tmpl = TASK_TEMPLATES[Math.floor(Math.random() * TASK_TEMPLATES.length)];
  const agent = AGENTS.find(a => a.role === tmpl.role && a.status === 'idle')
    || AGENTS.find(a => a.status === 'idle');
  if (!agent) return;
  
  const task = {
    id: `t${++taskIdCounter}`,
    title: tmpl.title,
    desc: tmpl.desc,
    status: 'running',
    assigneeId: agent.id,
    assigneeName: agent.name,
    createdAt: new Date().toISOString(),
    completedAt: null,
  };
  tasks.unshift(task);
  
  // Agent starts thinking
  agent.status = 'thinking';
  agent.taskId = task.id;
  addLog(`태스크 할당: "${task.title}"`, agent.id);
  spawnParticles(agent._px || 0, (agent._py || 0) - 20, STATUS_COLORS.thinking, 6);
  
  // Transition: thinking -> executing
  const thinkTime = 2000 + Math.random() * 3000;
  setTimeout(() => {
    if (agent.taskId !== task.id) return;
    agent.status = 'executing';
    addLog(`도구 실행 시작`, agent.id);
    
    // Transition: executing -> reviewing or done
    const execTime = 3000 + Math.random() * 5000;
    setTimeout(() => {
      if (agent.taskId !== task.id) return;
      
      // 85% success rate
      const success = Math.random() < 0.85;
      
      if (success) {
        agent.status = 'reviewing';
        addLog(`결과 리뷰 중`, agent.id);
        
        setTimeout(() => {
          agent.status = 'idle';
          agent.taskId = null;
          task.status = 'done';
          task.completedAt = new Date().toISOString();
          stats.completed++;
          stats.totalTime += Date.now() - new Date(task.createdAt).getTime();
          stats.count++;
          addLog(`✅ 태스크 완료: "${task.title}"`, agent.id);
          spawnParticles(agent._px || 0, (agent._py || 0) - 20, STATUS_COLORS.idle, 12);
          renderPanel();
        }, 1500 + Math.random() * 1500);
      } else {
        agent.status = 'blocked';
        task.status = 'failed';
        task.completedAt = new Date().toISOString();
        stats.failed++;
        stats.count++;
        addLog(`❌ 태스크 실패: "${task.title}"`, agent.id);
        spawnParticles(agent._px || 0, (agent._py || 0) - 20, STATUS_COLORS.blocked, 10);
        
        // Recover after delay
        setTimeout(() => {
          agent.status = 'idle';
          agent.taskId = null;
          addLog(`복구됨 — 대기 상태로 전환`, agent.id);
          renderPanel();
        }, 3000 + Math.random() * 2000);
      }
      renderPanel();
    }, execTime);
  }, thinkTime);
  
  renderPanel();
}

// Auto-generate tasks
setInterval(createSimTask, 4000 + Math.random() * 3000);
// Initial burst
setTimeout(createSimTask, 500);
setTimeout(createSimTask, 1200);
setTimeout(createSimTask, 2000);

// Clock
setInterval(() => {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('ko-KR', { hour12: false });
}, 1000);

// === SIDE PANEL RENDERING ===
const tabs = document.querySelectorAll('.tab');
tabs.forEach(tab => tab.addEventListener('click', () => {
  tabs.forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  currentTab = tab.dataset.tab;
  renderPanel();
}));

function renderPanel() {
  const el = document.getElementById('panel-content');
  
  if (currentTab === 'dashboard') {
    const active = AGENTS.filter(a => a.status !== 'offline').length;
    const completed = stats.completed;
    const failed = stats.failed;
    const rate = stats.count > 0 ? ((failed / stats.count) * 100).toFixed(1) : '0.0';
    const avgTime = stats.count > 0 ? (stats.totalTime / stats.count / 1000).toFixed(1) : '0';
    
    el.innerHTML = `
      <div class="kpi-grid">
        <div class="kpi-card">
          <div class="kpi-label">활성 에이전트</div>
          <div class="kpi-value" style="color:#34d399">${active}/${AGENTS.length}</div>
          <div class="kpi-trend up">● 모두 온라인</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">완료 태스크</div>
          <div class="kpi-value" style="color:#60a5fa">${completed}</div>
          <div class="kpi-trend up">▲ 실시간</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">실패율</div>
          <div class="kpi-value" style="color:${parseFloat(rate) > 20 ? '#f87171' : '#fbbf24'}">${rate}%</div>
          <div class="kpi-trend ${parseFloat(rate) > 15 ? 'down' : 'up'}">${parseFloat(rate) > 15 ? '▲ 주의' : '▼ 양호'}</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">평균 응답</div>
          <div class="kpi-value" style="color:#a78bfa">${avgTime}s</div>
          <div class="kpi-trend up">● 정상</div>
        </div>
      </div>
      <div style="font-size:11px;color:#6b7280;margin-bottom:6px">최근 태스크 현황</div>
      ${tasks.slice(0, 8).map(t => `
        <div class="task-item">
          <div style="display:flex;align-items:center;gap:6px">
            <span class="task-status ${t.status}">${t.status === 'done' ? '완료' : t.status === 'failed' ? '실패' : t.status === 'running' ? '진행중' : '대기'}</span>
            <span class="task-title">${t.title}</span>
          </div>
          <div class="task-meta">
            <span>👤 ${t.assigneeName}</span>
            <span>${new Date(t.createdAt).toLocaleTimeString('ko-KR', {hour:'2-digit',minute:'2-digit'})}</span>
          </div>
        </div>
      `).join('')}
    `;
  }
  
  else if (currentTab === 'agents') {
    el.innerHTML = AGENTS.map(a => `
      <div class="agent-item ${a.id === selectedAgentId ? 'selected' : ''}" onclick="selectedAgentId='${a.id}';renderPanel();">
        <div class="agent-avatar" style="background:${ROLE_COLORS[a.role]}22;border-color:${ROLE_COLORS[a.role]}">
          ${ROLE_EMOJI[a.role]}
        </div>
        <div class="agent-info">
          <div class="agent-name">${a.name}</div>
          <div class="agent-role">${a.role.toUpperCase()}</div>
          <div class="agent-status">
            <span class="status-dot" style="background:${STATUS_COLORS[a.status]}"></span>
            ${STATUS_LABELS[a.status]}
            ${a.taskId ? ` — ${tasks.find(t=>t.id===a.taskId)?.title||''}` : ''}
          </div>
        </div>
      </div>
    `).join('');
  }
  
  else if (currentTab === 'tasks') {
    const groups = { running: [], done: [], failed: [] };
    for (const t of tasks) { (groups[t.status] || []).push(t); }
    
    el.innerHTML = `
      <div style="font-size:11px;color:#6b7280;margin-bottom:8px">📋 칸반 보드</div>
      ${['running','done','failed'].map(status => `
        <div style="margin-bottom:12px">
          <div style="font-size:10px;color:${STATUS_COLORS[status==='running'?'executing':status==='done'?'idle':'blocked']};font-weight:600;margin-bottom:4px;text-transform:uppercase">
            ${status === 'running' ? '🔄 진행 중' : status === 'done' ? '✅ 완료' : '❌ 실패'} (${(groups[status]||[]).length})
          </div>
          ${(groups[status]||[]).slice(0,5).map(t => `
            <div class="task-item">
              <div class="task-title">${t.title}</div>
              <div class="task-meta"><span>👤 ${t.assigneeName}</span></div>
            </div>
          `).join('') || '<div style="font-size:10px;color:#4b5563;padding:4px">없음</div>'}
        </div>
      `).join('')}
    `;
  }
  
  else if (currentTab === 'log') {
    el.innerHTML = events.length === 0
      ? '<div style="font-size:11px;color:#4b5563;text-align:center;padding:20px">아직 이벤트가 없습니다</div>'
      : events.map(e => `
        <div class="log-entry">
          <span class="log-time">${e.time}</span>
          ${e.agentName ? `<span class="log-agent">${e.agentName}</span> ` : ''}
          ${e.msg}
        </div>
      `).join('');
  }
}

// Initial render + periodic refresh
renderPanel();
setInterval(renderPanel, 2000);
</script>
