services:
  clawhq:
    build: .
    ports:
      - "3001:3001"
    volumes:
      - clawhq-data:/app/data
      # Optional: mount OpenClaw config for live integration
      # - ~/.openclaw:/root/.openclaw:ro
    environment:
      - PORT=3001
      # - OPENCLAW_PATH=/root/.openclaw
    restart: unless-stopped

volumes:
  clawhq-data:
